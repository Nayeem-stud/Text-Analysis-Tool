<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Analyzer</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Text Analyzer</h1>
        <div class="container-content">
            <div class="text-entry">
                <textarea id="textarea" placeholder="Type or Paste your text here..."></textarea>
                <div class="buttons">
                    <button type="button" id="process-btn">Process Text</button>
                    <button type="button" id="copy-btn">Copy Results</button>
                </div>
            </div>
            <div class="text-info">
                <h2>Text Analysis</h2>
                <ul class="text-info-list">
                    <li><p>Character Count:</p><span id="char">0</span></li>
                    <li><p>Word Count:</p><span id="word">0</span></li>
                    <li><p>Sentences:</p><span id="sentences">0</span></li>
                    <li><p>Spaces:</p><span id="spaces">0</span></li>
                    <li><p>Punctuations:</p><span id="punctuations">0</span></li>
                    <li><p>Readability Score:</p><span id="readability">0</span></li>
                </ul>
            </div>
        </div>
        <footer>
            <p>Developed by ❤️ Nayeem</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
